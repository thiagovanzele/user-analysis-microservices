<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
</head>
<body style="margin:0; padding:0; font-family: Arial, sans-serif; background-color:#f4f6f8;">

<table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f6f8; padding:20px;">
    <tr>
        <td align="center">

            <table width="600" cellpadding="0" cellspacing="0" style="background:#ffffff; border-radius:10px; overflow:hidden;">

                <tr>
                    <td style="background:#0d6efd; color:#ffffff; padding:20px; text-align:center;">
                        <h2 style="margin:0;">🎉 Oferta Exclusiva</h2>
                    </td>
                </tr>

                <tr>
                    <td style="padding:30px; color:#333;">
                        <h3>Olá, <span th:text="${nome}"></span> 👋</h3>

                        <p style="font-size:16px; line-height:1.5;">
                            Temos uma excelente notícia pra você!
                        </p>

                        <p style="font-size:16px; line-height:1.5;" th:text="${mensagem}"></p>

                        <br>

                        <div style="text-align:center;">
                            <a href="https://github.com/thiagovanzele"
                               style="background:#0d6efd; color:#ffffff; padding:12px 25px; text-decoration:none; border-radius:5px; font-weight:bold;">
                                Ver Oferta 🚀
                            </a>
                        </div>

                        <br>

                        <p style="font-size:14px; color:#777;">
                            Se tiver dúvidas, estamos aqui para te ajudar.
                        </p>
                    </td>
                </tr>

                <tr>
                    <td style="background:#f1f1f1; padding:15px; text-align:center; font-size:12px; color:#999;">
                        Thiago Vanzele
                    </td>
                </tr>

            </table>

        </td>
    </tr>
</table>

</body>
</html>
